version: "2"

run:
  timeout: 5m
  tests: true
  build-tags:
    - integration

linters:
  default: standard
  enable:
    - bodyclose
    - gocritic
    - misspell
    - noctx
    - unconvert
    - unparam
    - prealloc
  exclusions:
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unparam
          - prealloc

formatters:
  enable:
    - gofmt
    - goimports

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
  sort-order:
    - linter
    - file
